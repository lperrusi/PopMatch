name: popmatch
description: "A swipe-based movie recommendation app that integrates with the TMDB API."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # HTTP and API
  http: ^1.1.0
  dio: ^5.4.0

  # UI and Animation
  cupertino_icons: ^1.0.2
  flutter_card_swiper: ^6.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  google_fonts: ^6.1.0

  # Utilities
  crypto: ^3.0.3
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  palette_generator: ^0.3.3+2
  
  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_functions: ^5.1.4
  cloud_firestore: ^5.6.9
  google_sign_in: ^7.1.1
  sign_in_with_apple: ^7.0.1
  
  # Video Player
  video_player: ^2.8.1
  chewie: ^1.7.4
  
  # Local Notifications
  flutter_local_notifications: ^16.3.2
  
  # Timezone
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  image: ^4.1.3

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/ 
    - assets/Icons/
    - assets/buttons/
    - assets/screens/
    - assets/screens/figma/
    - assets/animations/
    - assets/swipe/